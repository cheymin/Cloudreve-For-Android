name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=nightly-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APK files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release/Cloudreve-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release/Cloudreve-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "release/Cloudreve-${VERSION}-x86_64.apk"

      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Cloudreve ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cloudreve-${{ steps.version.outputs.version }}
          path: release/*.apk
